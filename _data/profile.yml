short_bio_text_justify: false
short_bio: >-
  <p>
  I’m <strong>Juan P. Sandoval</strong>, assistant professor and head of
  <strong>SE² — Software Engineering Research Group II</strong> at the
  <em>Department of Computer Science (DCC)</em>,
  <strong>Pontificia Universidad Católica de Chile</strong>.
  My research focuses on <strong>software engineering</strong> — I love building
  tools that help developers understand, test, and evolve complex systems.
  Recently, I’ve been exploring automated code generation, software mining
  repositories, and AI-driven approaches for software testing and maintenance.  </p>
  <p>
    <b>Join SE²</b> I’m always looking for motivated Master’s and PhD students to join our group.
    We define research topics together — if you’re interested in empirical software engineering,
    AI-driven development, or automated testing,
    <a href="https://jpsandoval.github.io/cv/">drop me a line</a> 🚀
  </p>
  <p>
    SE² is part of the
    <strong>Software Engineering &amp; Intelligent Systems Lab (SEIS Lab)</strong>.
  </p>

